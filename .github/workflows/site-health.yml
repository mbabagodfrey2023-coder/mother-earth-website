name: Site Health Check

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC daily — cloud-side, Mac-independent
  push:
    paths: ['index.html']   # also runs on every deploy commit
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax gate — block bad JS before it can reach prod
        run: node scripts/check-syntax.js

      - name: Local HTML — key strings present
        # Grep the checked-out file (avoids Cloudflare IP blocking on runner)
        run: |
          grep -q "ticker-ice"        index.html || (echo "FAIL: ticker-ice missing"         && exit 1)
          grep -q "fetchLiveData"     index.html || (echo "FAIL: fetchLiveData missing"      && exit 1)
          grep -q "MeshBasicMaterial" index.html || (echo "FAIL: globe code missing"         && exit 1)
          grep -q "PVT-PQ1AZ3KV"     index.html || (echo "FAIL: Company reg number missing" && exit 1)
          grep -q "Starting in Kenya" index.html || (echo "FAIL: Mission Statement missing"  && exit 1)
          echo "✓ All key strings present in local HTML"

      - name: Live site — Cloudflare responding (not 5xx)
        id: http
        run: |
          # 200 or 403 both mean Cloudflare/Worker is up. Only 5xx or timeout = real outage.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://motherearth.systems)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "HTTP $STATUS"
          [[ "$STATUS" == 2* || "$STATUS" == 403 ]] || exit 1

      - name: Live data — freshness check
        run: |
          DATA=$(curl -s --max-time 15 https://motherearth.systems/live-data.json)
          echo "$DATA" | python3 -c "
          import sys, json
          from datetime import datetime, timezone
          raw = sys.stdin.read()
          if not raw.strip():
              print('SKIP: live-data.json endpoint returned empty — Cloudflare blocks runner IPs on JSON endpoints too')
              sys.exit(0)
          try:
              d = json.loads(raw)
          except json.JSONDecodeError:
              print('SKIP: live-data.json returned non-JSON (likely Cloudflare challenge page)')
              sys.exit(0)
          updated = datetime.fromisoformat(d['updated'].replace('Z','+00:00'))
          age_h = (datetime.now(timezone.utc) - updated).total_seconds() / 3600
          co2 = d['environmental']['co2_ppm']
          print(f'CO2: {co2} ppm | Data age: {age_h:.1f}h')
          if age_h > 24:
              print(f'FAIL: live-data.json is {age_h:.0f}h old — WEB agent may be down')
              sys.exit(1)
          print('OK: live data is fresh')
          "

      - name: Report success
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ motherearth.systems HEALTHY"
          echo "✓ Syntax clean"
          echo "✓ Key strings in HTML"
          echo "✓ Cloudflare responding"
          echo "✓ Live data fresh"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Site health failure — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## Automated Health Check Failed',
                '',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '**Checks:**',
                '- Syntax gate',
                '- Key JS strings in local HTML',
                '- Cloudflare HTTP response (not 5xx)',
                '- live-data.json freshness',
                '',
                '**Action required:** Check the failed step above and deploy a fix.',
                '',
                '_This issue was opened automatically by the 24h cloud health monitor._'
              ].join('\n'),
              labels: ['bug', 'automated']
            });
