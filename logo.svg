<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 310" width="240" height="310">
  <defs>
    <clipPath id="gc"><circle cx="120" cy="112" r="40"/></clipPath>
    <radialGradient id="eg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#062020"/>
      <stop offset="100%" stop-color="#020808"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="240" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020606"/>
      <stop offset="100%" stop-color="#041212"/>
    </linearGradient>
    <linearGradient id="tg" x1="30" y1="0" x2="210" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="45%"  stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="gl" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="310" fill="url(#bg)" rx="14"/>

  <!-- Subtle background grid -->
  <g stroke="#4ade80" stroke-opacity="0.035" stroke-width="1">
    <line x1="0"   y1="77"  x2="240" y2="77"/>
    <line x1="0"   y1="154" x2="240" y2="154"/>
    <line x1="0"   y1="231" x2="240" y2="231"/>
    <line x1="80"  y1="0"   x2="80"  y2="310"/>
    <line x1="160" y1="0"   x2="160" y2="310"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="240" height="2" fill="url(#tg)" rx="0"/>

  <!-- ═══════════════════════════════════════════════
       7-BRANCH NETWORK MARK
       Centre (120, 112), globe r=40, terminal r=80
       Angles clockwise from 12 o'clock: 0, 51.4, 102.9, 154.3, 205.7, 257.1, 308.6°
       Exit points (globe edge):        Terminal nodes:
         i0 (120,  72)                    (120, 32)
         i1 (151,  87)                    (183, 62)
         i2 (159, 121)                    (198,130)
         i3 (137, 148)                    (154,184)
         i4 (103, 148)                    ( 86,184)
         i5 ( 81, 121)                    ( 42,130)
         i6 ( 89,  87)                    ( 57, 62)
       ═══════════════════════════════════════════════ -->

  <!-- Branch lines -->
  <line x1="120" y1="73"  x2="120" y2="35"  stroke="#4ade80" stroke-width="2"   stroke-linecap="round"/>
  <line x1="151" y1="87"  x2="181" y2="63"  stroke="#4ade80" stroke-width="2"   stroke-linecap="round"/>
  <line x1="159" y1="121" x2="196" y2="130" stroke="#4ade80" stroke-width="2"   stroke-linecap="round"/>
  <line x1="137" y1="148" x2="153" y2="182" stroke="#4ade80" stroke-width="2"   stroke-linecap="round"/>
  <line x1="103" y1="148" x2="87"  y2="182" stroke="#4ade80" stroke-width="2"   stroke-linecap="round"/>
  <line x1="81"  y1="121" x2="44"  y2="130" stroke="#4ade80" stroke-width="2"   stroke-linecap="round"/>
  <line x1="89"  y1="87"  x2="59"  y2="63"  stroke="#4ade80" stroke-width="2"   stroke-linecap="round"/>

  <!-- Terminal nodes (branch leads: AMARA, NEXUS, GAIA, ATLAS, IRIS, SAGE, ECHO) -->
  <circle cx="120" cy="32"  r="5.5" fill="#4ade80" filter="url(#gs)"/>
  <circle cx="183" cy="62"  r="5.5" fill="#4ade80"/>
  <circle cx="198" cy="130" r="5.5" fill="#4ade80"/>
  <circle cx="154" cy="184" r="5.5" fill="#4ade80"/>
  <circle cx="86"  cy="184" r="5.5" fill="#4ade80"/>
  <circle cx="42"  cy="130" r="5.5" fill="#4ade80"/>
  <circle cx="57"  cy="62"  r="5.5" fill="#4ade80"/>

  <!-- Globe fill -->
  <circle cx="120" cy="112" r="40" fill="url(#eg)"/>

  <!-- Latitude / longitude grid inside globe -->
  <g clip-path="url(#gc)">
    <!-- Equator -->
    <line x1="80" y1="112" x2="160" y2="112" stroke="#4ade80" stroke-opacity="0.30" stroke-width="0.8"/>
    <!-- ±12° lat lines -->
    <line x1="80" y1="99"  x2="160" y2="99"  stroke="#4ade80" stroke-opacity="0.15" stroke-width="0.6"/>
    <line x1="80" y1="125" x2="160" y2="125" stroke="#4ade80" stroke-opacity="0.15" stroke-width="0.6"/>
    <!-- Prime meridian (lon 36°E = centre) -->
    <line x1="120" y1="72" x2="120" y2="152" stroke="#4ade80" stroke-opacity="0.30" stroke-width="0.8"/>
    <!-- ±12° lon lines -->
    <line x1="107" y1="72" x2="107" y2="152" stroke="#4ade80" stroke-opacity="0.15" stroke-width="0.6"/>
    <line x1="133" y1="72" x2="133" y2="152" stroke="#4ade80" stroke-opacity="0.15" stroke-width="0.6"/>
    <!-- Kenya position dot (Nairobi: lon 36.8°E ≈ centre, lat 1.3°S ≈ equator) -->
    <circle cx="121" cy="113" r="5"   fill="#F4A822" filter="url(#gl)"/>
    <circle cx="121" cy="113" r="9.5" fill="none" stroke="#F4A822" stroke-width="0.8" stroke-opacity="0.45"/>
  </g>

  <!-- Globe outline -->
  <circle cx="120" cy="112" r="40" fill="none" stroke="#4ade80" stroke-width="2"/>

  <!-- ═══════════════════════
       WORDMARK
       ═══════════════════════ -->

  <!-- Divider -->
  <line x1="55" y1="232" x2="185" y2="232" stroke="#4ade80" stroke-opacity="0.25" stroke-width="0.7"/>

  <!-- MOTHER EARTH -->
  <text x="120" y="256"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="19"
        letter-spacing="3.5"
        text-anchor="middle"
        fill="url(#tg)">MOTHER EARTH</text>

  <!-- KENYA -->
  <text x="120" y="275"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10"
        font-weight="300"
        letter-spacing="9"
        text-anchor="middle"
        fill="#F4A822">K E N Y A</text>

  <!-- Tagline -->
  <text x="120" y="296"
        font-family="'Courier New', Courier, monospace"
        font-size="6.5"
        letter-spacing="2.5"
        text-anchor="middle"
        fill="#4ade80"
        fill-opacity="0.45">// PLANETARY INTELLIGENCE SYSTEM</text>

  <!-- Border inset -->
  <rect x="1" y="1" width="238" height="308" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.1" rx="13"/>
</svg>
