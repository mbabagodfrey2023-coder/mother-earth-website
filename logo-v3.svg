<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <!--
    Mother Earth Kenya — Logo v3
    CEO Council approved: 30 May 2026
    Mark: 7-node radial + Mount Kenya triple-peak central node
    Color: Deep forest #1B4332 · Earth #A65D38 · No gradients
    Type: Sentence case · Humanist sans
    Emotion: Rooted precision
  -->
  <defs>
    <clipPath id="cc"><circle cx="120" cy="115" r="42"/></clipPath>
    <filter id="sg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="300" fill="#0B1A0E" rx="14"/>

  <!-- Structural grid (very faint — not decorative, a system grid) -->
  <g stroke="#1B4332" stroke-opacity="0.18" stroke-width="1">
    <line x1="0"   y1="75"  x2="240" y2="75"/>
    <line x1="0"   y1="150" x2="240" y2="150"/>
    <line x1="0"   y1="225" x2="240" y2="225"/>
    <line x1="80"  y1="0"   x2="80"  y2="300"/>
    <line x1="160" y1="0"   x2="160" y2="300"/>
  </g>

  <!-- Earth-tone top bar -->
  <rect x="0" y="0" width="240" height="4" fill="#A65D38" rx="0"/>

  <!-- ═══════════════════════════════════
       7-BRANCH RADIAL MARK
       Centre (120,115), globe r=42, orbit r=78
       7 equidistant nodes clockwise from 12
       ═══════════════════════════════════ -->

  <!-- Orbital ring -->
  <circle cx="120" cy="115" r="78"
          fill="none" stroke="#2D6A4F" stroke-width="0.8"
          stroke-opacity="0.35" stroke-dasharray="3,6"/>

  <!-- Branch lines (circle edge → terminal node) -->
  <g stroke="#2D6A4F" stroke-width="1.6" stroke-linecap="round">
    <line x1="120" y1="73"  x2="120" y2="40"/>   <!-- 0 · AMARA   · top       -->
    <line x1="153" y1="89"  x2="179" y2="68"/>   <!-- 1 · NEXUS              -->
    <line x1="161" y1="124" x2="194" y2="132"/>  <!-- 2 · GAIA               -->
    <line x1="138" y1="153" x2="152" y2="183"/>  <!-- 3 · ATLAS              -->
    <line x1="102" y1="153" x2="88"  y2="183"/>  <!-- 4 · IRIS               -->
    <line x1="79"  y1="124" x2="46"  y2="132"/>  <!-- 5 · SAGE               -->
    <line x1="87"  y1="89"  x2="61"  y2="68"/>   <!-- 6 · ECHO               -->
  </g>

  <!-- Terminal nodes — earth-tone accent on the top (AMARA/Legal), green on rest -->
  <circle cx="120" cy="37"  r="5" fill="#A65D38" filter="url(#sg)"/>
  <circle cx="179" cy="68"  r="5" fill="#52B788"/>
  <circle cx="194" cy="132" r="5" fill="#52B788"/>
  <circle cx="152" cy="183" r="5" fill="#52B788"/>
  <circle cx="88"  cy="183" r="5" fill="#52B788"/>
  <circle cx="46"  cy="132" r="5" fill="#52B788"/>
  <circle cx="61"  cy="68"  r="5" fill="#52B788"/>

  <!-- ═══════════════════════════════════
       CENTRAL NODE — Mount Kenya
       Three peaks: Batian (centre/tallest),
       Nelion (right), Point Lenana (left)
       ═══════════════════════════════════ -->

  <!-- Circle fill -->
  <circle cx="120" cy="115" r="42" fill="#1B4332"/>

  <!-- Sky inside the circle (upper region — lighter tint) -->
  <rect x="78" y="73" width="84" height="62" fill="#0D2818" clip-path="url(#cc)"/>

  <!-- Mountain silhouette — earth tone -->
  <path d="M88,135 L103,91 L112,104 L121,83 L131,101 L140,90 L152,135 Z"
        fill="#A65D38" clip-path="url(#cc)"/>

  <!-- Snow caps — warm white (Batian, Nelion, Lenana) -->
  <g fill="#E8DFD0" clip-path="url(#cc)">
    <polygon points="116,96  121,83  127,96"/>  <!-- Batian   — centre, tallest -->
    <polygon points="100,98  103,91  107,98"/>  <!-- Lenana   — left            -->
    <polygon points="136,97  140,90  144,97"/>  <!-- Nelion   — right           -->
  </g>

  <!-- Circle outer stroke -->
  <circle cx="120" cy="115" r="42"
          fill="none" stroke="#2D6A4F" stroke-width="2"/>

  <!-- Earth-tone accent ring (ties the circle to the top bar) -->
  <circle cx="120" cy="115" r="44.5"
          fill="none" stroke="#A65D38" stroke-width="0.7" stroke-opacity="0.55"/>

  <!-- ═══════════════════
       WORDMARK
       ═══════════════════ -->

  <!-- Divider -->
  <line x1="55" y1="223" x2="185" y2="223"
        stroke="#2D6A4F" stroke-opacity="0.5" stroke-width="0.8"/>

  <!-- Primary name — sentence case, humanist weight -->
  <text x="120" y="247"
        font-family="'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif"
        font-size="17.5" font-weight="600" letter-spacing="0.5"
        text-anchor="middle" fill="#E8E4DC">Mother Earth Kenya</text>

  <!-- Descriptor — earth tone, widely spaced -->
  <text x="120" y="267"
        font-family="'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif"
        font-size="8.5" font-weight="300" letter-spacing="2.5"
        text-anchor="middle" fill="#A65D38">Planetary Intelligence System</text>

  <!-- Domain -->
  <text x="120" y="287"
        font-family="'Courier New', Courier, monospace"
        font-size="7" letter-spacing="1.5"
        text-anchor="middle" fill="#2D6A4F" fill-opacity="0.75">motherearth.systems</text>

  <!-- Border inset -->
  <rect x="1" y="4" width="238" height="295"
        fill="none" stroke="#1B4332" stroke-width="1"
        stroke-opacity="0.6" rx="13"/>
</svg>
