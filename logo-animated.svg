<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 124">
  <!--
    Mother Earth Kenya — The Globe Mark (Animated)
    Entrance sequence → pulse → breathe
    Works inline in HTML or as standalone SVG
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&amp;display=swap');

      /* ── Entrance animations ── */
      .globe-body { opacity:0; animation: fade-in 0.5s 0s ease forwards; }
      .globe-ring  { opacity:0; animation: fade-in 0.5s 0.15s ease forwards; }
      .accent-ring { opacity:0; animation: fade-in 0.4s 0.25s ease forwards; }

      .meridian {
        stroke-dasharray: 104; stroke-dashoffset: 104;
        animation: draw-line 0.75s 0.3s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      .eq-front {
        stroke-dasharray: 165; stroke-dashoffset: 165;
        animation: draw-line 0.7s 0.7s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      .eq-back {
        stroke-dasharray: 165; stroke-dashoffset: 165;
        animation: draw-line 0.7s 0.75s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      .lat-lines { opacity:0; animation: fade-in 0.5s 1.1s ease forwards; }

      /* Tree grows from base upward */
      .tree-group {
        transform-origin: 93px 75px;
        transform: scaleY(0);
        opacity: 0;
        animation: tree-grow 0.65s 1.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }

      /* Kenya pulse ring — expands and fades forever */
      .kenya-pulse-ring {
        transform-origin: 93px 75px;
        opacity: 0;
        animation: pulse-ring 2.4s 2.2s ease-out infinite;
      }

      /* Kenya core — fades in then breathes */
      .kenya-core {
        opacity: 0;
        animation: fade-in 0.3s 1.35s ease forwards,
                   core-breathe 3s 2.5s ease-in-out infinite;
      }

      /* Separator and wordmark */
      .sep        { opacity:0; animation: fade-in 0.35s 1.75s ease forwards; }
      .wm-name    { opacity:0; animation: slide-right 0.55s 1.85s cubic-bezier(0.2,0,0,1) forwards; }
      .wm-country { opacity:0; animation: slide-right 0.45s 2.05s cubic-bezier(0.2,0,0,1) forwards; }
      .wm-tagline { opacity:0; animation: fade-in 0.5s 2.25s ease forwards; }

      /* ── Keyframes ── */
      @keyframes fade-in {
        from { opacity: 0; } to { opacity: 1; }
      }
      @keyframes draw-line {
        to { stroke-dashoffset: 0; }
      }
      @keyframes tree-grow {
        from { transform: scaleY(0); opacity: 0; }
        to   { transform: scaleY(1); opacity: 1; }
      }
      @keyframes pulse-ring {
        0%   { transform: scale(1); opacity: 0.75; }
        80%  { transform: scale(5); opacity: 0; }
        100% { transform: scale(5); opacity: 0; }
      }
      @keyframes core-breathe {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.45; }
      }
      @keyframes slide-right {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }
    </style>

    <clipPath id="gc-a"><circle cx="62" cy="62" r="52"/></clipPath>
    <filter id="kglow-a" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Globe body -->
  <circle class="globe-body" cx="62" cy="62" r="52" fill="#0C1A0E"/>

  <g clip-path="url(#gc-a)">

    <!-- Back latitude lines (fade in together) -->
    <g class="lat-lines">
      <path d="M 14,42 A 48,15 0 0,0 110,42"
            fill="none" stroke="#2D6A4F" stroke-width="0.7" stroke-dasharray="2,4" stroke-opacity="0.3"/>
      <path d="M 13,80 A 49,15 0 0,0 111,80"
            fill="none" stroke="#2D6A4F" stroke-width="0.7" stroke-dasharray="2,4" stroke-opacity="0.3"/>
    </g>

    <!-- Back equatorial arc (draws in) -->
    <path class="eq-back"
          d="M 10,62 A 52,16 0 0,0 114,62"
          fill="none" stroke="#2D6A4F" stroke-width="0.9"
          stroke-dasharray="2,3.5" stroke-opacity="0.45"/>

    <!-- Prime meridian (draws in) -->
    <line class="meridian"
          x1="62" y1="10" x2="62" y2="114"
          stroke="#52B788" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Front equatorial arc (draws in) -->
    <path class="eq-front"
          d="M 10,62 A 52,16 0 0,1 114,62"
          fill="none" stroke="#52B788" stroke-width="1.5"/>

    <!-- Front latitude lines -->
    <g class="lat-lines">
      <path d="M 14,42 A 48,15 0 0,1 110,42"
            fill="none" stroke="#2D6A4F" stroke-width="0.7" stroke-dasharray="2,4" stroke-opacity="0.3"/>
      <path d="M 13,80 A 49,15 0 0,1 111,80"
            fill="none" stroke="#2D6A4F" stroke-width="0.7" stroke-dasharray="2,4" stroke-opacity="0.3"/>
    </g>

    <!-- Kenya pulse ring (expands outward forever) -->
    <circle class="kenya-pulse-ring"
            cx="93" cy="75" r="4"
            fill="none" stroke="#D4AF37" stroke-width="1.2"/>

    <!-- Acacia tree (grows upward from root) -->
    <g class="tree-group">
      <!-- Trunk -->
      <path d="M 90,75 Q 90,70 91.5,62 L 94.5,62 Q 96,70 96,75 Z" fill="#7A4A1E"/>
      <!-- Branch left-low -->
      <path d="M 91,69 Q 85,67 80,63" fill="none" stroke="#7A4A1E" stroke-width="2" stroke-linecap="round"/>
      <!-- Branch right-low -->
      <path d="M 95,69 Q 101,67 106,63" fill="none" stroke="#7A4A1E" stroke-width="2" stroke-linecap="round"/>
      <!-- Branch left-high -->
      <path d="M 92,65 Q 87,61 83,55" fill="none" stroke="#7A4A1E" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Branch right-high -->
      <path d="M 94,65 Q 99,61 103,55" fill="none" stroke="#7A4A1E" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Branch top -->
      <line x1="93" y1="63" x2="93" y2="51" stroke="#7A4A1E" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Leaf clusters — shadow -->
      <ellipse cx="79" cy="62" rx="6" ry="4" transform="rotate(-30 79 62)" fill="#2D6A4F"/>
      <ellipse cx="107" cy="62" rx="6" ry="4" transform="rotate(30 107 62)" fill="#2D6A4F"/>
      <ellipse cx="82" cy="54" rx="5.5" ry="3.5" transform="rotate(-20 82 54)" fill="#2D6A4F"/>
      <ellipse cx="104" cy="54" rx="5.5" ry="3.5" transform="rotate(20 104 54)" fill="#2D6A4F"/>
      <ellipse cx="93" cy="49" rx="5.5" ry="3.5" fill="#2D6A4F"/>
      <!-- Leaf clusters — bright -->
      <ellipse cx="79" cy="61" rx="4.5" ry="3" transform="rotate(-30 79 61)" fill="#52B788"/>
      <ellipse cx="107" cy="61" rx="4.5" ry="3" transform="rotate(30 107 61)" fill="#52B788"/>
      <ellipse cx="82" cy="53" rx="4" ry="2.8" transform="rotate(-20 82 53)" fill="#52B788"/>
      <ellipse cx="104" cy="53" rx="4" ry="2.8" transform="rotate(20 104 53)" fill="#52B788"/>
      <ellipse cx="93" cy="48" rx="4" ry="2.8" fill="#52B788"/>
    </g>

    <!-- Kenya root core (breathes independently) -->
    <circle class="kenya-core"
            cx="93" cy="75" r="2.5"
            fill="#F5A66A" filter="url(#kglow-a)"/>

  </g>

  <!-- Globe outer ring — gold -->
  <circle class="globe-ring" cx="62" cy="62" r="52"
          fill="none" stroke="#D4AF37" stroke-width="2.2"/>

  <!-- Accent ring — gold halo -->
  <circle class="accent-ring" cx="62" cy="62" r="54.5"
          fill="none" stroke="#D4AF37" stroke-width="0.7" stroke-opacity="0.5"/>

  <!-- Separator -->
  <line class="sep" x1="130" y1="18" x2="130" y2="106"
        stroke="#1B4332" stroke-width="1.1"/>

  <!-- Wordmark -->
  <text class="wm-name" x="148" y="54"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="27" font-weight="700" letter-spacing="2"
        fill="#F2F0EB">MOTHER EARTH</text>

  <text class="wm-country" x="150" y="76"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="11.5" font-weight="300" letter-spacing="8"
        fill="#D4763A">K E N Y A</text>

  <text class="wm-tagline" x="150" y="96"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="8" font-weight="300" letter-spacing="2.5"
        fill="#52B788" fill-opacity="0.6">Planetary Intelligence System</text>

</svg>
