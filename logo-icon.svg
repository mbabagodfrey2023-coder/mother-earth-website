<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <clipPath id="gc"><circle cx="60" cy="60" r="20"/></clipPath>
    <radialGradient id="eg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#062020"/>
      <stop offset="100%" stop-color="#020808"/>
    </radialGradient>
    <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 7 branch lines from globe edge to terminal nodes -->
  <!-- Center (60,60), globe r=20, terminal r=52 -->
  <!-- Angles: 0°=top, 51.4°, 102.9°, 154.3°, 205.7°, 257.1°, 308.6° (clockwise from 12) -->
  <line x1="60" y1="41" x2="60"  y2="11"  stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="48" x2="101" y2="28"  stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="64" x2="111" y2="72"  stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="69" y1="78" x2="83"  y2="107" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="51" y1="78" x2="37"  y2="107" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="64" x2="9"   y2="72"  stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="48" x2="19"  y2="28"  stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Terminal nodes (7 branches) -->
  <circle cx="60"  cy="8"   r="3.5" fill="#4ade80" filter="url(#gl)"/>
  <circle cx="101" cy="28"  r="3.5" fill="#4ade80"/>
  <circle cx="111" cy="72"  r="3.5" fill="#4ade80"/>
  <circle cx="83"  cy="107" r="3.5" fill="#4ade80"/>
  <circle cx="37"  cy="107" r="3.5" fill="#4ade80"/>
  <circle cx="9"   cy="72"  r="3.5" fill="#4ade80"/>
  <circle cx="19"  cy="28"  r="3.5" fill="#4ade80"/>

  <!-- Globe core -->
  <circle cx="60" cy="60" r="20" fill="url(#eg)"/>

  <!-- Latitude / longitude grid inside globe -->
  <g clip-path="url(#gc)">
    <line x1="40" y1="60" x2="80" y2="60" stroke="#4ade80" stroke-opacity="0.30" stroke-width="0.7"/>
    <line x1="40" y1="54" x2="80" y2="54" stroke="#4ade80" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="40" y1="66" x2="80" y2="66" stroke="#4ade80" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="60" y1="40" x2="60" y2="80" stroke="#4ade80" stroke-opacity="0.30" stroke-width="0.7"/>
    <line x1="54" y1="40" x2="54" y2="80" stroke="#4ade80" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="66" y1="40" x2="66" y2="80" stroke="#4ade80" stroke-opacity="0.15" stroke-width="0.5"/>
    <!-- Kenya position (lon ~37°E = slightly right of centre, lat ~0° = equator) -->
    <circle cx="64" cy="60" r="2.8" fill="#F4A822" filter="url(#gl)"/>
  </g>

  <!-- Globe outline -->
  <circle cx="60" cy="60" r="20" fill="none" stroke="#4ade80" stroke-width="1.5"/>
</svg>
