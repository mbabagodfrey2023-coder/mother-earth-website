<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mother Earth Kenya — Logo Header</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .logo-wrap {
    width: min(90vw, 90vh);
    height: min(90vw, 90vh);
    position: relative;
  }

  /* ── HEADER: already visible, gentle infinite loop ── */
  .logo-wrap object {
    width: 100%;
    height: 100%;

    /* Soft continuous breathe */
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% {
      transform: scale(1);
      filter: drop-shadow(0 0  0px rgba(196,163,58,0));
    }
    50% {
      transform: scale(1.018);
      filter: drop-shadow(0 0 12px rgba(196,163,58,0.28));
    }
  }
</style>
</head>
<body>
<div class="logo-wrap">
  <object type="image/svg+xml"
          data="logo-final.svg"
          style="width:100%;height:100%;"
          aria-label="Mother Earth Kenya logo">
  </object>
</div>
</body>
</html>
