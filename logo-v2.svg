<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 340">
  <defs>
    <clipPath id="ac">
      <path d="M53,36 L99,30 L145,48 L172,55 L197,94 L224,110 L206,137 L194,149 L190,174 L178,211 L159,230 L140,245 L123,247 L117,232 L108,214 L105,195 L105,159 L96,131 L62,128 L22,113 L16,100 L28,61 Z"/>
    </clipPath>
    <radialGradient id="ng" cx="181" cy="147" r="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1d6b44"/>
      <stop offset="28%"  stop-color="#083d24"/>
      <stop offset="75%"  stop-color="#031812"/>
      <stop offset="100%" stop-color="#020d0a"/>
    </radialGradient>
    <radialGradient id="kg" cx="181" cy="147" r="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F4A822" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F4A822" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="240" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#020606"/>
      <stop offset="100%" stop-color="#041212"/>
    </linearGradient>
    <linearGradient id="tg" x1="20" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="45%"  stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="340" fill="url(#bg)" rx="14"/>

  <!-- Grid -->
  <g stroke="#4ade80" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="85"  x2="240" y2="85"/>
    <line x1="0" y1="170" x2="240" y2="170"/>
    <line x1="0" y1="255" x2="240" y2="255"/>
    <line x1="80"  y1="0" x2="80"  y2="340"/>
    <line x1="160" y1="0" x2="160" y2="340"/>
  </g>

  <!-- Top accent -->
  <rect x="0" y="0" width="240" height="2" fill="url(#tg)"/>

  <!-- Africa fill -->
  <path d="M53,36 L99,30 L145,48 L172,55 L197,94 L224,110 L206,137 L194,149 L190,174 L178,211 L159,230 L140,245 L123,247 L117,232 L108,214 L105,195 L105,159 L96,131 L62,128 L22,113 L16,100 L28,61 Z"
        fill="url(#ng)"/>

  <!-- 7 circuit traces from Nairobi to capital cities (one per agent branch) -->
  <g clip-path="url(#ac)" stroke="#4ade80" stroke-opacity="0.28" stroke-width="0.75" stroke-dasharray="2,3.5">
    <line x1="181" y1="147" x2="163" y2="51"/>   <!-- AMARA  → Cairo        -->
    <line x1="181" y1="147" x2="77"  y2="125"/>  <!-- NEXUS  → Lagos        -->
    <line x1="181" y1="147" x2="154" y2="223"/>  <!-- GAIA   → Johannesburg -->
    <line x1="181" y1="147" x2="68"  y2="128"/>  <!-- ATLAS  → Accra        -->
    <line x1="181" y1="147" x2="16"  y2="103"/>  <!-- IRIS   → Dakar        -->
    <line x1="181" y1="147" x2="158" y2="89"/>   <!-- SAGE   → Khartoum     -->
    <line x1="181" y1="147" x2="190" y2="174"/>  <!-- ECHO   → Dar es Salaam-->
  </g>

  <!-- Kenya glow -->
  <circle cx="181" cy="147" r="28" fill="url(#kg)" clip-path="url(#ac)"/>

  <!-- City nodes -->
  <g clip-path="url(#ac)" fill="#4ade80" filter="url(#sglow)">
    <circle cx="163" cy="51"  r="2.2"/>
    <circle cx="77"  cy="125" r="2.2"/>
    <circle cx="154" cy="223" r="2.2"/>
    <circle cx="68"  cy="128" r="2.2"/>
    <circle cx="16"  cy="103" r="2.2"/>
    <circle cx="158" cy="89"  r="2.2"/>
    <circle cx="190" cy="174" r="2.2"/>
  </g>

  <!-- Nairobi / Kenya marker -->
  <circle cx="181" cy="147" r="5.5"  fill="#F4A822"   filter="url(#glow)"  clip-path="url(#ac)"/>
  <circle cx="181" cy="147" r="11"   fill="none" stroke="#F4A822" stroke-width="0.9" stroke-opacity="0.5" clip-path="url(#ac)"/>

  <!-- Africa outline -->
  <path d="M53,36 L99,30 L145,48 L172,55 L197,94 L224,110 L206,137 L194,149 L190,174 L178,211 L159,230 L140,245 L123,247 L117,232 L108,214 L105,195 L105,159 L96,131 L62,128 L22,113 L16,100 L28,61 Z"
        fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Divider -->
  <line x1="50" y1="267" x2="190" y2="267" stroke="#4ade80" stroke-opacity="0.25" stroke-width="0.7"/>

  <!-- MOTHER EARTH -->
  <text x="120" y="291"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="20" letter-spacing="3"
        text-anchor="middle" fill="url(#tg)">MOTHER EARTH</text>

  <!-- KENYA -->
  <text x="120" y="311"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="300" letter-spacing="9"
        text-anchor="middle" fill="#F4A822">K E N Y A</text>

  <!-- Tagline -->
  <text x="120" y="331"
        font-family="'Courier New', Courier, monospace"
        font-size="6.5" letter-spacing="2.5"
        text-anchor="middle" fill="#4ade80" fill-opacity="0.45">// PLANETARY INTELLIGENCE SYSTEM</text>

  <!-- Border inset -->
  <rect x="1" y="1" width="238" height="338" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.1" rx="13"/>
</svg>
