<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <clipPath id="ac">
      <path d="M26,8 L49,5 L72,14 L86,18 L99,37 L113,46 L103,59 L97,65 L95,78 L89,97 L80,106 L70,114 L61,115 L58,107 L54,98 L52,89 L52,70 L48,56 L30,55 L10,47 L7,41 L13,21 Z"/>
    </clipPath>
    <radialGradient id="ng" cx="91" cy="64" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1d6b44"/>
      <stop offset="30%"  stop-color="#083d24"/>
      <stop offset="80%"  stop-color="#031812"/>
      <stop offset="100%" stop-color="#020d0a"/>
    </radialGradient>
    <radialGradient id="kg" cx="91" cy="64" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F4A822" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F4A822" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Africa fill -->
  <path d="M26,8 L49,5 L72,14 L86,18 L99,37 L113,46 L103,59 L97,65 L95,78 L89,97 L80,106 L70,114 L61,115 L58,107 L54,98 L52,89 L52,70 L48,56 L30,55 L10,47 L7,41 L13,21 Z"
        fill="url(#ng)"/>

  <!-- Circuit traces from Nairobi -->
  <g clip-path="url(#ac)" stroke="#4ade80" stroke-opacity="0.28" stroke-width="0.6" stroke-dasharray="1.5,2.5">
    <line x1="91" y1="64" x2="82" y2="16"/>
    <line x1="91" y1="64" x2="38" y2="53"/>
    <line x1="91" y1="64" x2="77" y2="103"/>
    <line x1="91" y1="64" x2="33" y2="53"/>
    <line x1="91" y1="64" x2="7"  y2="42"/>
    <line x1="91" y1="64" x2="79" y2="35"/>
    <line x1="91" y1="64" x2="95" y2="78"/>
  </g>

  <!-- Kenya glow -->
  <circle cx="91" cy="64" r="14" fill="url(#kg)" clip-path="url(#ac)"/>

  <!-- City nodes -->
  <g clip-path="url(#ac)" fill="#4ade80" filter="url(#sglow)">
    <circle cx="82" cy="16"  r="1.5"/>
    <circle cx="38" cy="53"  r="1.5"/>
    <circle cx="77" cy="103" r="1.5"/>
    <circle cx="33" cy="53"  r="1.5"/>
    <circle cx="7"  cy="42"  r="1.5"/>
    <circle cx="79" cy="35"  r="1.5"/>
    <circle cx="95" cy="78"  r="1.5"/>
  </g>

  <!-- Nairobi marker -->
  <circle cx="91" cy="64" r="3.5" fill="#F4A822" filter="url(#glow)" clip-path="url(#ac)"/>
  <circle cx="91" cy="64" r="7"   fill="none" stroke="#F4A822" stroke-width="0.7" stroke-opacity="0.5" clip-path="url(#ac)"/>

  <!-- Africa outline -->
  <path d="M26,8 L49,5 L72,14 L86,18 L99,37 L113,46 L103,59 L97,65 L95,78 L89,97 L80,106 L70,114 L61,115 L58,107 L54,98 L52,89 L52,70 L48,56 L30,55 L10,47 L7,41 L13,21 Z"
        fill="none" stroke="#4ade80" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
